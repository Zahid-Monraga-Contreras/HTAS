<app-menu #sidebar></app-menu>

@if (mostrarToast) {
<div class="toast-premium-container" [ngClass]="tipoToast">
    <div class="toast-content">
        @if (tipoToast === 'success') { <i class="bi bi-check-circle-fill icon-toast"></i> }
        @if (tipoToast === 'error') { <i class="bi bi-exclamation-triangle-fill icon-toast"></i> }
        @if (tipoToast === 'warning') { <i class="bi bi-exclamation-circle-fill icon-toast"></i> }
        <span class="toast-message">{{ mensajeToast }}</span>
    </div>
</div>
}

<main class="main-content" [class.menu-collapsed]="sidebar.isCollapsed">
    @if (tratamientoSeleccionado) {
    <div class="container-fluid">
        <div class="header-section">
            <div class="title-group">
                <h2 class="title-page">Editar Tratamiento</h2>
                <p class="subtitle-page">Actualiza la información y dosificación del tratamiento médico de HTAS.</p>
            </div>

            <div class="header-controls">
                <button class="btn-cancel-premium" (click)="volver()">
                    <i class="bi bi-arrow-left"></i>
                    <span>Volver a la lista</span>
                </button>
            </div>
        </div>

        <div class="detail-card">
            <div class="form-grid">
                <div class="form-group">
                    <label>Dosis del Medicamento</label>
                    <input type="text" [(ngModel)]="tratamientoSeleccionado.dosis" maxlength="50"
                        class="form-control-premium" placeholder="Ej: 1 tableta, 5 ml">
                </div>

                <div class="form-group">
                    <label>Frecuencia (Cada cuántas horas)</label>
                    <input type="number" [(ngModel)]="tratamientoSeleccionado.frecuenciahoras"
                        class="form-control-premium" placeholder="Ej: 8, 12, 24">
                </div>

                <div class="form-group">
                    <label>Fecha de Inicio</label>
                    <div class="input-picker-wrapper">
                        <input type="text" id="fechaInicioInput" placeholder="Seleccione fecha..." readonly
                            class="form-control-premium picker-custom">
                        <i class="bi bi-calendar3 icon-embed"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Fecha de Finalización</label>
                    <div class="input-picker-wrapper">
                        <input type="text" id="fechaFinInput" placeholder="Seleccione fecha..." readonly
                            class="form-control-premium picker-custom">
                        <i class="bi bi-calendar3 icon-embed"></i>
                    </div>
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label>Estado del Tratamiento</label>
                    <select [(ngModel)]="tratamientoSeleccionado.activo" class="form-control-premium">
                        <option [value]="true">Activo / En curso</option>
                        <option [value]="false">Inactivo / Suspendido</option>
                    </select>
                </div>
            </div>

            <div class="form-group full-width-group" style="margin-top: 15px;">
                <label>Notas e Instrucciones del Tratamiento</label>
                <textarea [(ngModel)]="tratamientoSeleccionado.notasinstrucciones" rows="4" class="form-control-premium"
                    placeholder="Ej: Tomar después de comer, evitar consumir lácteos..."></textarea>
            </div>

            <div class="action-footer">
                <button class="btn-cancel-premium" (click)="volver()" [disabled]="isSaving">Cancelar</button>
                <button class="btn-save" (click)="guardarCambios()" [disabled]="isSaving">
                    @if (isSaving) {
                    <span class="spinner-save"></span>
                    <span>Guardando...</span>
                    } @else {
                    <i class="bi bi-check-lg"></i>
                    <span>Guardar Cambios</span>
                    }
                </button>
            </div>
        </div>
    </div>
    }
</main>
