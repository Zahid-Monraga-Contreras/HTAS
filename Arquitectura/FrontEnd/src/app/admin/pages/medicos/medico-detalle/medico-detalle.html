<app-menu #sidebar></app-menu>

@if (mostrarToast) {
<div class="toast-premium-container" [ngClass]="tipoToast">
    <div class="toast-content">
        @if (tipoToast === 'success') { <i class="bi bi-check-circle-fill icon-toast"></i> }
        @if (tipoToast === 'error') { <i class="bi bi-exclamation-triangle-fill icon-toast"></i> }
        @if (tipoToast === 'warning') { <i class="bi bi-exclamation-circle-fill icon-toast"></i> }
        <span class="toast-message">{{ mensajeToast }}</span>
    </div>
</div>
}

<main class="main-content" [class.menu-collapsed]="sidebar.isCollapsed">
    @if (usuarioSeleccionado) {
    <div class="container-fluid">
        <div class="header-section">
            <div class="title-group">
                <h2 class="title-page">Editar Médico</h2>
                <p class="subtitle-page">Actualiza la información detallada del médico.</p>
            </div>

            <div class="header-controls">
                <button class="btn-cancel-premium" (click)="volver()">
                    <i class="bi bi-arrow-left"></i>
                    <span>Volver a la lista</span>
                </button>
            </div>
        </div>

        <div class="detail-card">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre(s)</label>
                    <input type="text" [(ngModel)]="usuarioSeleccionado.tempNombre" class="form-control-premium">
                </div>
                <div class="form-group">
                    <label>Apellido Paterno</label>
                    <input type="text" [(ngModel)]="usuarioSeleccionado.tempApellidoPaterno"
                        class="form-control-premium">
                </div>
                <div class="form-group">
                    <label>Apellido Materno</label>
                    <input type="text" [(ngModel)]="usuarioSeleccionado.tempApellidoMaterno"
                        class="form-control-premium">
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" [(ngModel)]="usuarioSeleccionado.correo" class="form-control-premium">
                </div>
                <div class="form-group">
                    <label>Especialidad</label>
                    <input type="text" [(ngModel)]="usuarioSeleccionado.especialidad" class="form-control-premium">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" [(ngModel)]="usuarioSeleccionado.telefono" class="form-control-premium">
                </div>
                <div class="form-group" style="grid-column: span 3;">
                    <label>Dirección Clínica</label>
                    <input type="text" [(ngModel)]="usuarioSeleccionado.direccionClinica" class="form-control-premium">
                </div>
            </div>

            <div class="action-footer">
                <button class="btn-cancel-premium" (click)="volver()" [disabled]="isSaving">Cancelar</button>
                <button class="btn-save" (click)="guardarCambios()" [disabled]="isSaving">
                    @if (isSaving) {
                    <span class="spinner-save"></span>
                    <span>Guardando...</span>
                    } @else {
                    <i class="bi bi-check-lg"></i>
                    <span>Guardar Cambios</span>
                    }
                </button>
            </div>
        </div>
    </div>
    }
</main>
