<app-menu #sidebar></app-menu>

@if (mostrarToast) {
<div class="toast-premium-container" [ngClass]="tipoToast">
    <div class="toast-content">
        @if (tipoToast === 'success') { <i class="bi bi-check-circle-fill icon-toast"></i> }
        @if (tipoToast === 'error') { <i class="bi bi-exclamation-triangle-fill icon-toast"></i> }
        @if (tipoToast === 'warning') { <i class="bi bi-exclamation-circle-fill icon-toast"></i> }
        <span class="toast-message">{{ mensajeToast }}</span>
    </div>
</div>
}

<main class="main-content" [class.menu-collapsed]="sidebar.isCollapsed">
    @if (medicamentoSeleccionado) {
    <div class="container-fluid">
        <div class="header-section">
            <div class="title-group">
                <h2 class="title-page">Editar Medicamento</h2>
                <p class="subtitle-page">Actualiza la información del medicamento en el catálogo.</p>
            </div>

            <div class="header-controls">
                <button class="btn-cancel-premium" (click)="volver()">
                    <i class="bi bi-arrow-left"></i>
                    <span>Volver a la lista</span>
                </button>
            </div>
        </div>

        <div class="detail-card">
            <div class="form-grid">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Nombre Comercial</label>
                    <input type="text" [(ngModel)]="medicamentoSeleccionado.nombrecomercial" maxlength="100"
                        class="form-control-premium" placeholder="Ej: Amoxicilina, Ibuprofeno...">
                </div>

                <div class="form-group">
                    <label>Sustancia Activa</label>
                    <input type="text" [(ngModel)]="medicamentoSeleccionado.sustanciaactiva" maxlength="100"
                        class="form-control-premium" placeholder="Ej: Paracetamol...">
                </div>

                <div class="form-group">
                    <label>Presentación</label>
                    <input type="text" [(ngModel)]="medicamentoSeleccionado.presentacion" maxlength="50"
                        class="form-control-premium" placeholder="Ej: Caja, Jarabe, Ampolletas...">
                </div>

                <div class="form-group">
                    <label>Concentración</label>
                    <input type="text" [(ngModel)]="medicamentoSeleccionado.concentracion" maxlength="50"
                        class="form-control-premium" placeholder="Ej: 500 mg, 10 ml...">
                </div>

                <div class="form-group">
                    <label>Laboratorio</label>
                    <input type="text" [(ngModel)]="medicamentoSeleccionado.laboratorio" maxlength="100"
                        class="form-control-premium" placeholder="Ej: Bayer, Genomma Lab...">
                </div>
            </div>

            <div class="form-group full-width-group" style="margin-top: 15px;">
                <label>Indicaciones Generales</label>
                <textarea [(ngModel)]="medicamentoSeleccionado.indicacionesgenerales" rows="4"
                    class="form-control-premium"
                    placeholder="Describe el uso del medicamento e indicaciones..."></textarea>
            </div>

            <div class="action-footer">
                <button class="btn-cancel-premium" (click)="volver()" [disabled]="isSaving">Cancelar</button>
                <button class="btn-save" (click)="guardarCambios()" [disabled]="isSaving">
                    @if (isSaving) {
                    <span class="spinner-save"></span>
                    <span>Guardando...</span>
                    } @else {
                    <i class="bi bi-check-lg"></i>
                    <span>Guardar Cambios</span>
                    }
                </button>
            </div>
        </div>
    </div>
    }
</main>
