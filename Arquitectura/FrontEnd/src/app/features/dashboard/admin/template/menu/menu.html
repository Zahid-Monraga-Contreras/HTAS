<div class="wrapper">
    <nav class="navbar-top d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center h-100">
            <div class="logo-box d-flex align-items-center justify-content-center" [class.collapsed]="isCollapsed">
                <span class="logo-text">HTAS</span>
            </div>

            <button class="btn-toggle-menu" (click)="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
        </div>

        <div class="header-right-icons d-flex align-items-center">
            <div class="search-container d-flex align-items-center" [class.active]="showSearch">
                <input type="text" class="search-input" placeholder="Buscar..." #searchInput [value]="searchTerm"
                    (keyup.enter)="onSearch(searchInput.value)">
                <i class="bi bi-search icon-gray" (click)="onSearch(searchInput.value); toggleSearch()"></i>
            </div>

            <div class="actions-group d-flex align-items-center">
                <a routerLink="/notificaciones" class="notif-wrapper">
                    <i class="bi bi-bell icon-gray"></i>
                </a>

                <ng-container *ngIf="userName !== 'Invitado'; else noUser">
                    <a routerLink="/perfil" class="user-pill d-flex align-items-center">
                        <img [src]="userPhoto" class="user-img" [alt]="userName" referrerpolicy="no-referrer"
                            (error)="userPhoto = generarAvatarFallback(userName)">
                        <span class="user-name-text">{{ userName }}</span>
                    </a>
                </ng-container>

                <ng-template #noUser>
                    <div class="user-pill d-flex align-items-center">
                        <i class="bi bi-person-circle icon-gray"
                            style="font-size: 24px; margin-right: 8px; margin-bottom: 0;"></i>
                        <span class="user-name-text">Invitado</span>
                    </div>
                </ng-template>
            </div>
        </div>
    </nav>

    <aside class="sidebar-menu" [class.collapsed]="isCollapsed">
        <ul class="nav-links-list">

            @for (section of menuFiltrado; track section.category) {
            @if (!isCollapsed) {
            <li class="nav-section-title">{{ section.category }}</li>
            } @else {
            <hr class="sidebar-divider">
            }

            @for (item of section.items; track item.label) {
            <li>
                <a [routerLink]="item.route" [queryParams]="item.queryParams" [class.active-item]="isActive(item.route)"
                    class="nav-item-link">
                    <i class="bi {{item.icon}}"></i>
                    @if (!isCollapsed) {
                    <span class="nav-label">{{item.label}}</span>
                    }
                </a>
            </li>
            }
            }

            <hr class="sidebar-divider">
            <li>
                <button (click)="logout()"
                    class="nav-item-link w-100 text-start bg-transparent border-0 d-flex align-items-center"
                    style="cursor: pointer;">
                    <i class="bi bi-box-arrow-right"></i>
                    @if (!isCollapsed) {
                    <span class="nav-label">Cerrar Sesión</span>
                    }
                </button>
            </li>

        </ul>
    </aside>
</div>
