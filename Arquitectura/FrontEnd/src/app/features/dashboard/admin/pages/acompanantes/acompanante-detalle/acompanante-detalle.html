<app-menu #sidebar></app-menu>

@if (mostrarToast) {
<div class="toast-premium-container" [ngClass]="tipoToast">
    <div class="toast-content">
        @if (tipoToast === 'success') { <i class="bi bi-check-circle-fill icon-toast"></i> }
        @if (tipoToast === 'error') { <i class="bi bi-exclamation-triangle-fill icon-toast"></i> }
        @if (tipoToast === 'warning') { <i class="bi bi-exclamation-circle-fill icon-toast"></i> }
        <span class="toast-message">{{ mensajeToast }}</span>
    </div>
</div>
}

<main class="main-content" [class.menu-collapsed]="sidebar.isCollapsed">
    @if (usuarioSeleccionado) {
    <div class="container-fluid">
        <!-- HEADER SECTION -->
        <div class="header-section">
            <div class="title-group">
                <h2 class="title-page">Editar Acompañante</h2>
                <p class="subtitle-page">Actualiza la información y el expediente del acompañante.</p>
            </div>

            <div class="header-controls">
                <button class="btn-cancel-premium" (click)="volver()">
                    <i class="bi bi-arrow-left"></i>
                    <span>Volver a la lista</span>
                </button>
            </div>
        </div>

        <!-- MENÚ DE NAVEGACIÓN POR PESTAÑAS -->
        <div class="tabs-nav-wrapper">
            <nav class="tabs-nav">
                <button type="button" class="tab-btn" [class.active]="activeTab === 'info'"
                    (click)="cambiarTab('info')">
                    <i class="bi bi-person-vcard"></i>
                    <span>Información del Acompañante</span>
                </button>
                <button type="button" class="tab-btn" [class.active]="activeTab === 'historial'"
                    (click)="cambiarTab('historial')">
                    <i class="bi bi-clock-history"></i>
                    <span>Historial</span>
                </button>
                <button type="button" class="tab-btn" [class.active]="activeTab === 'expediente'"
                    (click)="cambiarTab('expediente')">
                    <i class="bi bi-file-earmark-medical"></i>
                    <span>Expediente</span>
                </button>
            </nav>
        </div>

        <!-- ============================================================ -->
        <!-- TAB 1: INFORMACIÓN DEL ACOMPAÑANTE                            -->
        <!-- ============================================================ -->
        <app-info-acompanante [hidden]="activeTab !== 'info'" [usuarioSeleccionado]="usuarioSeleccionado"
            [isSaving]="isSaving" (guardarCambios)="guardarCambios()" (volver)="volver()">
        </app-info-acompanante>

        <!-- ============================================================ -->
        <!-- TAB 2: HISTORIAL                                              -->
        <!-- ============================================================ -->
        <app-historial-acompanante [hidden]="activeTab !== 'historial'" [historialCambios]="historialCambios"
            [visitasAcompanante]="visitasAcompanante" [estadisticas]="estadisticas">
        </app-historial-acompanante>

        <!-- ============================================================ -->
        <!-- TAB 3: EXPEDIENTE DEL ACOMPAÑANTE                             -->
        <!-- ============================================================ -->
        <app-expediente-acompanante [hidden]="activeTab !== 'expediente'" [usuarioSeleccionado]="usuarioSeleccionado"
            [acompananteId]="acompananteId" [visitasAcompanante]="visitasAcompanante"
            [fechaGeneracion]="fechaGeneracion">
        </app-expediente-acompanante>

    </div>
    }
</main>
